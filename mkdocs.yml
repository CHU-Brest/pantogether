
site_name: PAN-TOGETHER
site_url: https://pantogether.fr
repo_url: https://github.com/CHU-Brest/pantogether
edit_uri: edit/main/docs/
nav:
  - Accueil: index.md
  - Patients: 
    - patients/informations.md
    - patients/associations.md
    - patients/evenements.md
    - patients/webconferences.md
  - Carte interactive des centres experts :
    - cartes.html
  - RCP:
    - rcp/RCP.md
    - Carte intéractive des RCP: rcp/rcpfvb.html
    - Oesophage, Estomac, Jonction oesogastrique: rcp/oes.html
    - Foie et voies biliaires: rcp/fvb2.html
  - Recherche : 
   - recherche/rechercheclinique.html
  - Ressources : 
    - ressources/recommandations.md
    - ressources/documentation.md
  - Agenda:
    - agenda/évènements.md
    - agenda/webinaires.md
    - agenda/formations.md
  - Contacts: contacts.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      toc_depth: 3

extra:
  meta:
    - name: robots
      content: noindex, nofollow
  

theme:
  name: material
  logo: assets/pantogether.png
  favicon: assets/pantogether.png
  palette:
    scheme: default
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - content.action.edit

extra_css:
  - stylesheets/extra.css

