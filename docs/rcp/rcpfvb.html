<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; }

#map { height: 100vh; width: 100vw; }

#panel {
  position: fixed; top: 0; left: 0;
  width: 280px; height: 100vh;
  background: white; padding: 14px;
  overflow-y: auto; z-index: 2000;
  box-shadow: 2px 0 8px rgba(0,0,0,.2);
  transition: left 0.3s;
}

#togglePanel {
  position: fixed; top: 10px; left: 10px;
  z-index: 3000; background: #3498db; color: white;
  border: none; padding: 8px 12px; border-radius: 6px;
  font-size: 16px; cursor: pointer; display: none;
}

@media(max-width:768px) {
  #panel { left: -290px; }
  #panel.open { left: 0; }
  #togglePanel { display: block; }
}

h3 { font-size: 15px; margin-bottom: 8px; color: #2c3e50; }
hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }

/* Filtres axe */
.axe-filter {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
}
.axe-btn {
  padding: 6px 12px; border: 2px solid transparent;
  border-radius: 20px; cursor: pointer; font-size: 13px;
  font-weight: bold; transition: 0.2s; flex: 1; text-align: center;
}
.axe-btn.oeso  { background: #e8f8f0; border-color: #27ae60; color: #27ae60; }
.axe-btn.foie  { background: #eaf3fb; border-color: #2980b9; color: #2980b9; }
.axe-btn.active.oeso { background: #27ae60; color: white; }
.axe-btn.active.foie { background: #2980b9; color: white; }

/* Filtre région */
select {
  width: 100%; padding: 7px; border: 1px solid #ddd;
  border-radius: 6px; font-size: 13px; margin-bottom: 10px;
}

/* Liste centres */
#listeCentres {
  max-height: 220px; overflow-y: auto;
  border: 1px solid #eee; border-radius: 6px;
}
.centre-item {
  padding: 7px 9px; cursor: pointer;
  border-bottom: 1px solid #f0f0f0; font-size: 13px;
  transition: background 0.15s;
}
.centre-item:hover { background: #f5f8ff; }
.centre-item .axe-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; margin-right: 6px; vertical-align: middle;
}
.centre-item small { color: #888; }

/* Légende */
.legende { margin-top: 4px; }
.legende-item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 4px; }
.legende-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

/* Popup */
.popup-rcp { max-height: 480px; overflow-y: auto; width: 520px; max-width: 92vw; font-size: 13px; }
.popup-rcp h4 { color: #2c3e50; margin-bottom: 4px; font-size: 16px; }
.popup-rcp .axe-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 11px; font-weight: bold; margin-bottom: 6px; color: white;
}
/* Card par RCP */
.rcp-card {
  border: 1px solid #e2e8f0; border-radius: 8px;
  padding: 10px 12px; margin-bottom: 10px; background: #fafbfc;
}
.rcp-card:last-child { margin-bottom: 0; }
.rcp-card .rcp-titre { font-weight: bold; color: #2c3e50; margin-bottom: 6px; line-height: 1.3; }
.rcp-card .rcp-reseau { font-size: 11px; color: #888; font-style: italic; margin-bottom: 6px; }
.rcp-card .rcp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; margin-bottom: 8px; }
.rcp-card .rcp-field { font-size: 12px; }
.rcp-card .rcp-field span { color: #666; }
.rcp-card .rcp-field b { color: #333; }
.rcp-card .rcp-soumission {
  background: #eef6ff; border-left: 3px solid #3498db;
  padding: 6px 9px; border-radius: 4px; font-size: 12px;
  margin-top: 6px; line-height: 1.5;
}
.rcp-card .rcp-soumission b { display: block; margin-bottom: 2px; color: #2980b9; }
.rcp-card .rcp-contact {
  background: #f0faf4; border-left: 3px solid #27ae60;
  padding: 6px 9px; border-radius: 4px; font-size: 12px;
  margin-top: 6px; line-height: 1.5;
}
.rcp-card .rcp-contact b { display: block; margin-bottom: 2px; color: #27ae60; }
.rcp-card .rcp-contact a { color: #2980b9; }

#compteur { font-size: 12px; color: #888; margin-bottom: 8px; }

// Appliquer les patches : on crée une clé unique par centre+axe+rang
centres.forEach(c => {
  c.rcps.forEach((r, i) => {
    // Essai avec suffixe axe d'abord, puis sans
    const keyAvecAxe = c.nom + ' ' + c.axe + '|' + i;
    const keySansAxe = c.nom + '|' + i;
    const patch = patches[keyAvecAxe] || patches[keySansAxe];
    if (patch) {
      if (patch.lieu !== undefined) r.lieu = patch.lieu;
      if (patch.soumission !== undefined) r.soumission = patch.soumission;
    }
  });
});

// ===================== CARTE =====================
const map = L.map('map').setView([46.6, 2.5], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

const icons = {
  oeso: L.icon({ iconUrl: "https://maps.google.com/mapfiles/ms/icons/green-dot.png", iconSize: [32,32], iconAnchor: [16,32] }),
  foie: L.icon({ iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",  iconSize: [32,32], iconAnchor: [16,32] })
};

const markerGroup = L.markerClusterGroup({
  showCoverageOnHover: false,
  spiderfyOnMaxZoom: true,
  zoomToBoundsOnClick: false,
  maxClusterRadius: 50,
  spiderLegPolylineOptions: { weight: 2, color: '#555', opacity: 0.7 },
  iconCreateFunction: cluster => {
    const markers = cluster.getAllChildMarkers();
    const axes = new Set(markers.map(m => m.options.axe));
    let color = '#7f8c8d';
    if (axes.size === 1) {
      if (axes.has('oeso')) color = '#27ae60';
      else if (axes.has('foie')) color = '#2980b9';
    }
    return L.divIcon({
      html: `<div style="background:${color};color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,.35)">${cluster.getChildCount()}</div>`,
      className: '', iconSize: [36, 36]
    });
  }
});
map.addLayer(markerGroup);

markerGroup.on('clusterclick', function(e) {
  const markers = e.layer.getAllChildMarkers();
  const villes = new Set(markers.map(m => m.options.ville));
  if (villes.size === 1) {
    e.layer.spiderfy();
  } else {
    e.layer.zoomToBounds({ padding: [30, 30] });
  }
});

// ===================== POPUP =====================
function buildPopup(c) {
  const couleur = c.axe === 'oeso' ? '#27ae60' : '#2980b9';
  const label   = c.axe === 'oeso' ? 'Oeso-gastrique' : 'Foie & voies biliaires';

  const cards = c.rcps.map(r => {
    const contactHtml = (r.ama || r.email || r.tel) ? `
      <div class="rcp-contact">
        <b>📋 AMA / Contact</b>
        ${r.ama ? r.ama + '<br>' : ''}
        ${r.email ? '<a href="mailto:' + r.email + '">' + r.email + '</a><br>' : ''}
        ${r.tel ? r.tel : ''}
        ${r.fax ? r.fax : ''}
      </div>` : '';

    const soumissionHtml = r.soumission ? `
      <div class="rcp-soumission">
        <b>📂 Modalités de soumission</b>
        ${r.soumission}
      </div>` : '';

    return '<div class="rcp-card">'
      + '<div class="rcp-titre">' + r.reunion + '</div>'
      + (r.reseau ? '<div class="rcp-reseau">Réseau : ' + r.reseau + '</div>' : '')
      + '<div class="rcp-grid">'
      + '<div class="rcp-field"><span>📅 Jour :</span> <b>' + (r.jour || '–') + '</b></div>'
      + '<div class="rcp-field"><span>🕐 Horaire :</span> <b>' + (r.horaire || '–') + '</b></div>'
      + '<div class="rcp-field"><span>🔁 Fréquence :</span> <b>' + (r.freq || '–') + '</b></div>'
      + '<div class="rcp-field"><span>📍 Lieu :</span> <b>' + (r.lieu || '–') + '</b></div>'
      + '</div>'
      + contactHtml
      + soumissionHtml
      + '</div>';
  }).join('');

  return '<div class="popup-rcp">'
    + '<h4>' + c.nom + '</h4>'
    + '<span class="axe-badge" style="background:' + couleur + '">' + label + '</span>'
    + '<small style="color:#888;display:block;margin-bottom:10px">' + c.ville + ' · ' + c.region + '</small>'
    + cards
    + '</div>';
}

// ===================== FILTRES =====================
let activeAxes = new Set(['oeso', 'foie']);
let activeRegion = '';

const regionSelect = document.getElementById('regionFilter');
const regions = [...new Set(centres.map(c => c.region))].sort();
regions.forEach(r => {
  const opt = document.createElement('option');
  opt.value = r; opt.textContent = r;
  regionSelect.appendChild(opt);
});

function afficher() {
  markerGroup.clearLayers();
  const liste = document.getElementById('listeCentres');
  liste.innerHTML = '';

  const visibles = centres.filter(c =>
    activeAxes.has(c.axe) && (!activeRegion || c.region === activeRegion)
  );

  document.getElementById('compteur').textContent = `${visibles.length} centre(s) affiché(s)`;

  visibles.forEach(c => {
    const marker = L.marker([c.lat, c.lng], { icon: icons[c.axe], axe: c.axe, ville: c.ville })
      .bindPopup(buildPopup(c), { maxWidth: 460, minWidth: 320, className: 'popup-rcp' });
    markerGroup.addLayer(marker);

    const item = document.createElement('div');
    item.className = 'centre-item';
    const couleur = c.axe === 'oeso' ? '#27ae60' : '#2980b9';
    item.innerHTML = `<span class="axe-dot" style="background:${couleur}"></span><b>${c.nom}</b><br><small>${c.ville}</small>`;
    item.onclick = () => { map.setView([c.lat, c.lng], 9); marker.openPopup(); };
    liste.appendChild(item);
  });
}

// Boutons axe
document.querySelectorAll('.axe-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const axe = btn.dataset.axe;
    btn.classList.toggle('active');
    if (activeAxes.has(axe)) activeAxes.delete(axe);
    else activeAxes.add(axe);
    afficher();
  });
});

regionSelect.addEventListener('change', () => {
  activeRegion = regionSelect.value;
  afficher();
});

afficher();

document.getElementById('togglePanel').onclick = () =>
  document.getElementById('panel').classList.toggle('open');
</script>
