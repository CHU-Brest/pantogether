<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Carte régions</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Arial;
}

body{
  display:flex;
}

#map{
  flex:1;
  height:100vh;
}

#sidebar{
  width:350px;
  padding:15px;
  border-left:1px solid #ddd;
  overflow:auto;
}

.region-label{
  background:transparent;
  border:none;
  box-shadow:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <h2>Centres</h2>
  <p>Clique sur une région</p>
</div>

<script>

// =====================
// MAP
// =====================
const map = L.map('map').setView([46.5,2.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OSM'
}).addTo(map);

// =====================
// DATA CENTRES
// =====================
const regionsData = {
  "Bretagne":{
    centers:[
      {nom:"CHU Pontchaillou", ville:"Rennes"}
    ]
  },
  "Île-de-France":{
    centers:[
      {nom:"Pitié-Salpêtrière", ville:"Paris"}
    ]
  }
};

// =====================
// SIDEBAR
// =====================
const sidebar = document.getElementById("sidebar");

function show(regionName){

  const data = regionsData[regionName];

  if(!data){
    sidebar.innerHTML = `<h2>${regionName}</h2><p>Aucun centre</p>`;
    return;
  }

  let html = `<h2>${regionName}</h2>`;

  data.centers.forEach(c=>{
    html += `
      <div style="padding:10px;border:1px solid #ddd;margin-bottom:10px">
        <b>${c.nom}</b><br/>
        ${c.ville}
      </div>
    `;
  });

  sidebar.innerHTML = html;
}

// =====================
// GEOJSON (IMPORTANT)
// =====================

// ⚠️ version robuste via fetch + logs
fetch("https://france-geojson.gregoiredavid.fr/repo/regions.geojson")
.then(r => r.json())
.then(geojson => {

  const layer = L.geoJSON(geojson, {

    style: {
      fillColor:"#d9d9d9",
      color:"#ffffff",
      weight:1,
      fillOpacity:0.8
    },

    onEachFeature: function(feature, l){

      const name =
        feature.properties.nom ||
        feature.properties.name ||
        "inconnu";

      console.log("Region:", name);

      l.bindTooltip(name, {
        permanent:true,
        direction:"center",
        className:"region-label"
      });

      l.on("mouseover", ()=>{
        l.setStyle({fillOpacity:1});
      });

      l.on("mouseout", ()=>{
        layer.resetStyle(l);
      });

      // ⭐ CLICK IMPORTANT
      l.on("click", ()=>{
        console.log("CLICK OK:", name);
        show(name);
      });
    }

  }).addTo(map);

})
.catch(err=>{
  console.error("GeoJSON error", err);
});

</script>

</body>
</html>
