---
title: Foie et voies biliaires
---

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Carte RCP Foie</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Arial;
}

body{
  display:flex;
}

#map{
  flex:1;
  height:100vh;
}

#sidebar{
  width:380px;
  padding:18px;
  border-left:1px solid #ddd;
  overflow:auto;
  background:#fff;
}

h2{
  margin-top:0;
  color:#1f4e79;
}
/* FILTERS */
#filters{
  padding:10px;
  border-bottom:1px solid #ddd;
  margin-bottom:10px;
}

button{
  margin:3px;
  padding:6px 10px;
  border:1px solid #ccc;
  background:#f7f7f7;
  cursor:pointer;
  border-radius:6px;
}

button.active{
  background:#3498db;
  color:white;
  border-color:#3498db;
}
.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
  background:#fafafa;
}

.card h3{
  margin:0 0 8px;
}

.card p{
  margin:4px 0;
  font-size:14px;
}
.region-label{
  font-size:12px;
  font-weight:bold;
}
details{
  margin-top:8px;
}

summary{
  cursor:pointer;
  font-weight:bold;
}

.leaflet-interactive{
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">

  <div id="filters">

    <b>Type cancer :</b><br>

    <button onclick="setFilter('all')" class="active">Tous</button>
    <button onclick="setFilter('oesogastrique')">Oesogastrique</button>
    <button onclick="setFilter('foie')">Foie</button>
    <button onclick="setFilter('pancreas')">Pancréas</button>

    <hr>

    <b>Zone :</b><br>

    <button onclick="setZone('all')" class="active">Tous</button>
    <button onclick="setZone('metropole')">Métropole</button>
    <button onclick="setZone('drom')">DROM</button>

  </div>

  <h2>Centres</h2>
  <p>Clique une région</p>

</div>
<script>

// =====================
// MAP
// =====================
const map = L.map('map').setView([46.5,2.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OSM'
}).addTo(map);

// =====================
// CENTRES
// =====================
const data = {
  "Bretagne":[
    {
      nom:'CHU Pontchaillou',
      ville:'Rennes',
      type:"foie",
      réunion:'RCP des tumeurs primitives hépatiques',
      réseau:'',
      jour:'Jeudi',
      horaire:'16h00',
      fréquence:'Hebdomadaire',
      lieu:'Service imagerie',
      visioconférence:'',

      dossier:`
<details>
  <summary>Modalités de soumission d'un dossier</summary>

  Dossier à déposer sur le DCC du patient :

  <br><br>

  <a href="https://auth.telesantebretagne.org/" target="_blank">Onco Bretagne</a>

  <br><br>

  Ou via :

  <br><br>

  <a href="https://www.telesante-bretagne.fr/" target="_blank">Télésanté Bretagne</a>
</details>

<details>
  <summary>AMA en charge de la RCP</summary>

  <a href="mailto:secretariat.rcp@rennes.unicancer.fr">
    secretariat.rcp@rennes.unicancer.fr
  </a>
</details>
`
    }
  ],
"Guadeloupe":[
    {
      nom:"CHU Pointe-à-Pitre",
      ville:"Guadeloupe",
      type:"pancreas",
      zone:"drom"
    }
  ],
  
  "Île-de-France":[
    {
      nom:"Pitié-Salpêtrière",
      ville:"Paris"
      type:"oesogastrique",
    }
  ]
};
// =====================
// FILTRES
// =====================
let currentType = "all";
let currentZone = "all";

function setFilter(type){
  currentType = type;
  updateButtons();
  refreshSidebar(lastRegion);
}

function setZone(zone){
  currentZone = zone;
  updateButtons();
  refreshSidebar(lastRegion);
}

function updateButtons(){
  document.querySelectorAll("button").forEach(b=>{
    b.classList.remove("active");
  });
}
// =====================
// SIDEBAR
// =====================
const sidebar = document.getElementById("sidebar");
let lastRegion = null;

function show(region){

  lastRegion = region;
  refreshSidebar(region);
}

function refreshSidebar(region){

  const list = data[region] || [];

  const filtered = list.filter(c=>{
    const okType = currentType==="all" || c.type===currentType;
    const okZone = currentZone==="all" || c.zone===currentZone;
    return okType && okZone;
  });

  let html = `<h2>${region}</h2>`;

  if(filtered.length===0){
    html += "<p>Aucun centre pour ce filtre</p>";
  }

  filtered.forEach(c=>{
    html += `
      <div class="card">

        <h3>${c.nom}</h3>
        <p><b>Ville :</b> ${c.ville || ''}</p>
        <p><b>Réunion :</b> ${c.réunion || ''}</p>
        <p><b>Réseau :</b> ${c.réseau || ''}</p>
        <p><b>Jour :</b> ${c.jour || ''}</p>
        <p><b>Horaire :</b> ${c.horaire || ''}</p>
        <p><b>Fréquence :</b> ${c.fréquence || ''}</p>
        <p><b>Lieu :</b> ${c.lieu || ''}</p>
        <p><b>Visioconférence :</b> ${c.visioconférence || ''}</p>

        ${c.dossier || ''}

      </div>
    `;

  });

document.getElementById("sidebar").innerHTML = html;
}

// =====================
// GEOJSON LOCAL (IMPORTANT)
// =====================
fetch("https://pantogether.fr/data/regions.geojson")
.then(r => r.json())
.then(geojson => {

  const layerGroup = L.geoJSON(geojson, {

    style:{
      fillColor:"#d9d9d9",
      color:"#ffffff",
      weight:1,
      fillOpacity:0.8
    },

    onEachFeature:(feature, layer)=>{

      const name =
        feature.properties.nom ||
        feature.properties.name;

      layer.bindTooltip(name,{
        permanent:true,
        direction:"center"
      });

      layer.on("mouseover", ()=>{
        layer.setStyle({fillOpacity:1});
      });

      layer.on("mouseout", ()=>{
        layerGroup.resetStyle(layer);
      });

      layer.on("click", ()=>{
        show(name);
      });

    }

  }).addTo(map);

});

</script>

</body>
</html>
