<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Carte des régions & centres</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:Arial, sans-serif;
}

body{
  display:flex;
  overflow:hidden;
}

/* =========================
   CARTE
========================= */

#map{
  flex:1;
  height:100vh;
}

/* =========================
   SIDEBAR
========================= */

#sidebar{
  width:360px;
  background:white;
  border-left:1px solid #ddd;
  overflow:auto;
  padding:20px;
  box-shadow:-2px 0 8px rgba(0,0,0,.08);
}

#sidebar h2{
  margin-top:0;
  color:#1f4e79;
}

.center-card{
  border:1px solid #ddd;
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
  background:#fafafa;
}

.center-card h3{
  margin-top:0;
  margin-bottom:10px;
  color:#2c3e50;
}

.center-card p{
  margin:5px 0;
  font-size:14px;
}

.badge{
  display:inline-block;
  margin-top:10px;
  padding:5px 10px;
  border-radius:999px;
  background:#3498db;
  color:white;
  font-size:12px;
}

/* =========================
   REGIONS
========================= */

.leaflet-interactive{
  cursor:pointer;
}

.region-label{
  background:transparent;
  border:none;
  box-shadow:none;
  color:#333;
  font-weight:bold;
  font-size:13px;
}

/* =========================
   DETAILS
========================= */

details{
  margin-top:10px;
}

summary{
  cursor:pointer;
  font-weight:bold;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

  body{
    flex-direction:column;
  }

  #map{
    height:60vh;
  }

  #sidebar{
    width:100%;
    height:40vh;
    border-left:none;
    border-top:1px solid #ddd;
  }

}

</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <h2>Centres</h2>
  <p>Cliquez sur une région pour afficher les centres associés.</p>
</div>

<script>

// =========================
// INITIALISATION CARTE
// =========================

const map = L.map('map', {
  zoomControl:true,
  minZoom:5
}).setView([46.5, 2.5], 6);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution:'© OpenStreetMap contributors'
  }
).addTo(map);

// =========================
// DONNÉES
// =========================

const regions = {

  Bretagne:{
    centers:[
      {
        nom:'CHU Pontchaillou',
        ville:'Rennes',
        réunion:'RCP des tumeurs primitives hépatiques',
        réseau:'',
        jour:'Jeudi',
        horaire:'16h00',
        fréquence:'Hebdomadaire',
        lieu:'Service imagerie',
        visioconférence:'',

        dossier:`
<details>
  <summary>Modalités de soumission d'un dossier</summary>

  Dossier à déposer sur le DCC du patient :

  <br><br>

  <a href="https://auth.telesantebretagne.org/" target="_blank">
    Onco Bretagne
  </a>

  <br><br>

  Ou transmission via :

  <br><br>

  <a href="https://www.telesante-bretagne.fr/" target="_blank">
    Télésanté Bretagne
  </a>

</details>

<details>
  <summary>AMA en charge de la RCP</summary>

  <a href="mailto:secretariat.rcp@rennes.unicancer.fr">
    secretariat.rcp@rennes.unicancer.fr
  </a>

</details>
`
      }
    ]
  },

  "Île-de-France":{
    centers:[
      {
        nom:'AP-HP Pitié-Salpêtrière',
        ville:'Paris'
      }
    ]
  },

  Occitanie:{
    centers:[
      {
        nom:'CHU Toulouse',
        ville:'Toulouse'
      }
    ]
  },

  "Provence-Alpes-Côte d'Azur":{
    centers:[
      {
        nom:'APHM Marseille',
        ville:'Marseille'
      }
    ]
  }

};

// =========================
// SIDEBAR
// =========================

const sidebar = document.getElementById('sidebar');

function displayCenters(regionName){

  const region = regions[regionName];

  // Région sans données
  if(!region){

    sidebar.innerHTML = `
      <h2>${regionName}</h2>
      <p>Aucun centre renseigné.</p>
    `;

    return;
  }

  let html = `
    <h2>${regionName}</h2>
    <p>${region.centers.length} centre(s)</p>
  `;

  region.centers.forEach(center => {

    html += `
      <div class="center-card">

        <h3>${center.nom || ''}</h3>

        <p><strong>Ville :</strong> ${center.ville || ''}</p>

        ${
          center.réunion
          ? `<p><strong>Réunion :</strong> ${center.réunion}</p>`
          : ''
        }

        ${
          center.réseau
          ? `<p><strong>Réseau :</strong> ${center.réseau}</p>`
          : ''
        }

        ${
          center.jour
          ? `<p><strong>Jour :</strong> ${center.jour}</p>`
          : ''
        }

        ${
          center.horaire
          ? `<p><strong>Horaire :</strong> ${center.horaire}</p>`
          : ''
        }

        ${
          center.fréquence
          ? `<p><strong>Fréquence :</strong> ${center.fréquence}</p>`
          : ''
        }

        ${
          center.lieu
          ? `<p><strong>Lieu :</strong> ${center.lieu}</p>`
          : ''
        }

        ${
          center.visioconférence
          ? `<p><strong>Visioconférence :</strong> ${center.visioconférence}</p>`
          : ''
        }

        ${center.dossier || ''}

        <br>

        <span class="badge">${regionName}</span>

      </div>
    `;

  });

  sidebar.innerHTML = html;
}

// =========================
// GEOJSON REGIONS
// =========================

fetch('https://france-geojson.gregoiredavid.fr/repo/regions.geojson')

  .then(response => response.json())

  .then(data => {

    L.geoJSON(data, {

      style: function(){

        return {
          fillColor:'#d9d9d9',
          weight:1.5,
          opacity:1,
          color:'#ffffff',
          fillOpacity:0.8
        };

      },

      onEachFeature: function(feature, layer){

        // Selon le GeoJSON
        const regionName =
          feature.properties.nom ||
          feature.properties.name ||
          '';

        // Tooltip nom région
        layer.bindTooltip(regionName, {
          permanent:true,
          direction:'center',
          className:'region-label'
        });

        // Hover
        layer.on('mouseover', function(e){

          e.target.setStyle({
            fillOpacity:1,
            weight:2
          });

        });

        // Fin hover
        layer.on('mouseout', function(e){

          e.target.setStyle({
            fillOpacity:0.8,
            weight:1.5
          });

        });

        // CLICK REGION
        layer.on('click', function(){

          displayCenters(regionName);

        });

      }

    }).addTo(map);

  })

  .catch(error => {

    console.error('Erreur GeoJSON :', error);

  });

</script>

</body>
</html>
