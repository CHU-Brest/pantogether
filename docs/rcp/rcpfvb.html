title: Foie et voies biliaires
---

<!DOCTYPE html>
<html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carte des régions & centres</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  font-family:Arial, sans-serif;
}

body{
  display:flex;
}

/* ===== Carte ===== */
#map{
  flex:1;
  height:100vh;
  z-index:1;
}

/* ===== Panneau droite ===== */
#sidebar{
  width:360px;
  background:white;
  border-left:1px solid #ddd;
  overflow:auto;
  padding:20px;
  box-shadow:-2px 0 8px rgba(0,0,0,.1);
}

#sidebar h2{
  margin-top:0;
  color:#1f4e79;
}

.center-card{
  border:1px solid #ddd;
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
  background:#fafafa;
  transition:0.2s;
}

.center-card:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.center-card h3{
  margin:0 0 8px;
  color:#2c3e50;
}

.center-card p{
  margin:4px 0;
  font-size:14px;
}

.badge{
  display:inline-block;
  margin-top:8px;
  padding:4px 8px;
  border-radius:999px;
  background:#3498db;
  color:white;
  font-size:12px;
}
  .leaflet-interactive{
  cursor:pointer;
}

/* ===== Responsive ===== */
@media(max-width:900px){
  body{
    flex-direction:column;
  }

  #sidebar{
    width:100%;
    height:40vh;
    border-left:none;
    border-top:1px solid #ddd;
  }

  #map{
    height:60vh;
  }
}
</style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <h2>Centres</h2>
  <p>Cliquez sur une région pour afficher les centres associés.</p>
</div>

<script>
// =========================
// Initialisation carte
// =========================
const map = L.map('map', {
  zoomControl: true,
  minZoom: 5
}).setView([46.5, 2.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap contributors'
}).addTo(map);

// =========================
// Données régions + centres
// =========================
const regions = {

  Bretagne:{
    color:'#4CAF50',

    centers:[
      {
        nom:'CHU Pontchaillou',
        ville:'Rennes',
        réunion:'RCP des tumeurs primitives hépatiques',
        réseau:'',
        jour:'Jeudi',
        horaire:'16h00',
        fréquence:'hebdomadaire',
        lieu:'Service imagerie',
        visioconférence:'',

        dossier: `
<details>
  <summary><strong>Modalités de soumission d'un dossier</strong></summary>

  Dossier à déposer sur le dossier communicant de cancérologie (DCC) du patient
  <a href="https://auth.telesantebretagne.org/" target="_blank">
    Onco Bretagne
  </a>

  <br><br>

  Ou transmission via
  <a href="https://www.telesante-bretagne.fr/" target="_blank">
    Télésanté Bretagne
  </a>

</details>

<br>

<details>
  <summary><strong>AMA en charge de la RCP</strong></summary>

  <a href="mailto:secretariat.rcp@rennes.unicancer.fr">
    secretariat.rcp@rennes.unicancer.fr
  </a>

</details>
`
      }
    ]
  },

  'Île-de-France':{
    color:'#2196F3',

    centers:[
      {
        nom:'AP-HP Pitié-Salpêtrière',
        ville:'Paris',
        type:'CHU',
        contact:'01 42 16 00 00'
      },

      {
        nom:'Hôpital Necker',
        ville:'Paris',
        type:'Centre expert',
        contact:'01 44 49 40 00'
      }
    ]
  },

  Occitanie:{
    color:'#FF9800',

    centers:[
      {
        nom:'CHU Toulouse',
        ville:'Toulouse',
        type:'CHU',
        contact:'05 61 77 22 33'
      }
    ]
  },

  "Provence-Alpes-Côte d'Azur":{
    color:'#E91E63',

    centers:[
      {
        nom:'APHM Marseille',
        ville:'Marseille',
        type:'CHU',
        contact:'04 91 38 00 00'
      }
    ]
  }

};

// =========================
// Sidebar
// =========================
const sidebar = document.getElementById('sidebar');

function displayCenters(regionName){

  const region = regions[regionName];

  if(!region){
    sidebar.innerHTML = `
      <h2>${regionName}</h2>
      <p>Aucun centre renseigné.</p>
    `;
    return;
  }

  let html = `
    <h2>${regionName}</h2>
    <p>${region.centers.length} centre(s)</p>
  `;

  region.centers.forEach(center => {

    html += `
      <div class="center-card">

        <h3>${center.nom || ''}</h3>

        <p><strong>Ville :</strong> ${center.ville || ''}</p>
        <p><strong>Réunion :</strong> ${center.réunion || ''}</p>
        <p><strong>Réseau :</strong> ${center.réseau || ''}</p>
        <p><strong>Jour :</strong> ${center.jour || ''}</p>
        <p><strong>Horaire :</strong> ${center.horaire || ''}</p>
        <p><strong>Fréquence :</strong> ${center.fréquence || ''}</p>
        <p><strong>Lieu :</strong> ${center.lieu || ''}</p>
        <p><strong>Visioconférence :</strong> ${center.visioconférence || ''}</p>

        ${center.dossier || ''}

        <span class="badge">${regionName}</span>

      </div>
    `;

  });

  sidebar.innerHTML = html;
}

// =========================
// Affichage régions
// =========================
let geojson;

// Chargement GeoJSON France
fetch('https://france-geojson.gregoiredavid.fr/repo/regions.geojson')

  .then(res => res.json())

  .then(data => {

    geojson = L.geoJSON(data, {

      style: feature => {

        const regionName = feature.properties.nom;
        const regionData = regions[regionName];

        return {
          fillColor: regionData ? regionData.color : '#dcdcdc',
          weight: 2,
          opacity: 1,
          color: 'white',
          fillOpacity: 0.7
        };
      },

      onEachFeature: (feature, layer) => {

        const regionName = feature.properties.nom;
console.log(feature.properties);
        console.log(regionName);

        // Tooltip
        layer.bindTooltip(regionName, {
          sticky: true
        });

        // Hover
        layer.on('mouseover', e => {

          e.target.setStyle({
            fillOpacity: 1,
            weight: 3
          });

        });

        // Sortie hover
        layer.on('mouseout', e => {

          geojson.resetStyle(e.target);

        });

        // Clic région
        layer.on('click', () => {

          if(regions[regionName]){
            displayCenters(regionName);
          }

          map.fitBounds(layer.getBounds(), {
            padding:[20,20]
          });

        });

      }

    }).addTo(map);

  })

  .catch(error => {
    console.error('Erreur GeoJSON :', error);
  });

</script>
  
</body>
</html>
`
