---
title: Foie et voies biliaires
---

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Carte RCP Foie</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Arial;
}

body{
  display:flex;
}

#map{
  flex:1;
  height:100vh;
}

#sidebar{
  width:380px;
  padding:18px;
  border-left:1px solid #ddd;
  overflow:auto;
  background:#fff;
}

h2{
  margin-top:0;
  color:#1f4e79;
}

/* FILTERS */
#filters{
  padding:10px;
  border-bottom:1px solid #ddd;
  margin-bottom:10px;
}

button{
  margin:3px;
  padding:6px 10px;
  border:1px solid #ccc;
  background:#f7f7f7;
  cursor:pointer;
  border-radius:6px;
}

button.active{
  background:#3498db;
  color:white;
  border-color:#3498db;
}

.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
  background:#fafafa;
}

.card h3{margin:0 0 8px;}
.card p{margin:4px 0;font-size:14px;}

.leaflet-interactive{
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">

  <div id="filters">

    <b>Type cancer :</b><br>

    <button onclick="setFilter('all')" id="f-all" class="active">Tous</button>
    <button onclick="setFilter('oesogastrique')" id="f-oeso">Oesogastrique</button>
    <button onclick="setFilter('foie')" id="f-foie">Foie</button>
    <button onclick="setFilter('pancreas')" id="f-pan">Pancréas</button>

    <hr>

    <b>Zone :</b><br>

    <button onclick="setZone('all')" id="z-all" class="active">Tous</button>
    <button onclick="setZone('metropole')" id="z-metro">Métropole</button>
    <button onclick="setZone('drom')" id="z-drom">DROM</button>

  </div>

  <h2>Centres</h2>
  <p>Clique sur une région</p>

</div>

<script>

// =====================
// MAP
// =====================
const map = L.map('map').setView([46.5,2.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OSM'
}).addTo(map);

// =====================
// DATA
// =====================
const data = {
"Bretagne":[
    {
      nom:'CHU Pontchaillou',
      ville:'Rennes',
      type:"foie",
      réunion:'RCP des tumeurs primitives hépatiques',
      réseau:'',
      jour:'Jeudi',
      horaire:'16h00',
      fréquence:'Hebdomadaire',
      lieu:'Service imagerie',
      visioconférence:'',

      dossier:`
<details>
  <summary>Modalités de soumission d'un dossier</summary>

  Dossier à déposer sur le DCC du patient :

  <br><br>

  <a href="https://auth.telesantebretagne.org/" target="_blank">Onco Bretagne</a>

  <br><br>

  Ou via :

  <br><br>

  <a href="https://www.telesante-bretagne.fr/" target="_blank">Télésanté Bretagne</a>
</details>

<details>
  <summary>AMA en charge de la RCP</summary>

  <a href="mailto:secretariat.rcp@rennes.unicancer.fr">
    secretariat.rcp@rennes.unicancer.fr
  </a>
</details>
`
    }
  ],


  "Guadeloupe":[
    {
      nom:"CHU Pointe-à-Pitre",
      ville:"Guadeloupe",
      type:"pancreas",
      zone:"drom"
    }
  ],

  "Île-de-France":[
    {
      nom:"Pitié-Salpêtrière",
      ville:"Paris",
      type:"oesogastrique",
      zone:"metropole"
    }
  ]
};

// =====================
// STATE
// =====================
let currentType = "all";
let currentZone = "all";
let lastRegion = null;

// =====================
// FILTER UI
// =====================
function setFilter(type){
  currentType = type;
  updateButtons();
  if(lastRegion) refreshSidebar(lastRegion);
}

function setZone(zone){
  currentZone = zone;
  updateButtons();
  if(lastRegion) refreshSidebar(lastRegion);
}

function updateButtons(){

  document.querySelectorAll("#filters button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("f-" + currentType)?.classList.add("active");
  document.getElementById("z-" + currentZone)?.classList.add("active");
}

// =====================
// SIDEBAR
// =====================
const sidebar = document.getElementById("sidebar");

function show(region){
  lastRegion = region;
  refreshSidebar(region);
}

function refreshSidebar(region){

  const list = data[region] || [];

  const filtered = list.filter(c =>
    (currentType === "all" || c.type === currentType) &&
    (currentZone === "all" || c.zone === currentZone)
  );

  let html = `<h2>${region}</h2>`;

  if(filtered.length === 0){
    html += "<p>Aucun centre</p>";
  }

  filtered.forEach(c=>{
    html += `
      <div class="card">
        <h3>${c.nom}</h3>
        <p>${c.ville || ""}</p>
        <p>${c.type || ""}</p>
        ${c.dossier || ""}
      </div>
    `;
  });

  sidebar.innerHTML = html;
}

// =====================
// GEOJSON
// =====================
fetch("https://pantogether.fr/data/regions.geojson")
.then(r => r.json())
.then(geojson => {

  const layerGroup = L.geoJSON(geojson, {

    style:{
      fillColor:"#d9d9d9",
      color:"#ffffff",
      weight:1,
      fillOpacity:0.8
    },

    onEachFeature:(feature, layer)=>{

      const name = feature.properties.nom;

      layer.bindTooltip(name,{
        permanent:true,
        direction:"center"
      });

      layer.on("click", ()=>{
        show(name);
      });

      layer.on("mouseover", ()=>{
        layer.setStyle({fillOpacity:1});
      });

      layer.on("mouseout", ()=>{
        layerGroup.resetStyle(layer);
      });

    }

  }).addTo(map);

});

</script>

</body>
</html>
