title: Foie et voies biliaires
---

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Carte RCP Foie</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Arial;
}

body{
  display:flex;
}

#map{
  flex:1;
  height:100vh;
}

#sidebar{
  width:380px;
  padding:18px;
  border-left:1px solid #ddd;
  overflow:auto;
  background:#fff;
}

h2{
  margin-top:0;
  color:#1f4e79;
}

.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
  background:#fafafa;
}

.card h3{
  margin:0 0 8px;
}

.card p{
  margin:4px 0;
  font-size:14px;
}

details{
  margin-top:8px;
}

summary{
  cursor:pointer;
  font-weight:bold;
}

.leaflet-interactive{
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <h2>Centres</h2>
  <p>Clique sur une région</p>
</div>

<script>

// =====================
// MAP
// =====================
const map = L.map('map').setView([46.5,2.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OSM'
}).addTo(map);

// =====================
// CENTRES
// =====================
const data = {
  "Bretagne":[
    {
      nom:'CHU Pontchaillou',
      ville:'Rennes',
      réunion:'RCP des tumeurs primitives hépatiques',
      réseau:'',
      jour:'Jeudi',
      horaire:'16h00',
      fréquence:'Hebdomadaire',
      lieu:'Service imagerie',
      visioconférence:'',

      dossier:`
<details>
  <summary>Modalités de soumission d'un dossier</summary>

  Dossier à déposer sur le DCC du patient :

  <br><br>

  <a href="https://auth.telesantebretagne.org/" target="_blank">Onco Bretagne</a>

  <br><br>

  Ou via :

  <br><br>

  <a href="https://www.telesante-bretagne.fr/" target="_blank">Télésanté Bretagne</a>
</details>

<details>
  <summary>AMA en charge de la RCP</summary>

  <a href="mailto:secretariat.rcp@rennes.unicancer.fr">
    secretariat.rcp@rennes.unicancer.fr
  </a>
</details>
`
    }
  ],

  "Île-de-France":[
    {
      nom:"Pitié-Salpêtrière",
      ville:"Paris"
    }
  ]
};

// =====================
// SIDEBAR
// =====================
const sidebar = document.getElementById("sidebar");

function show(region){

  const centers = data[region];

  if(!centers){
    sidebar.innerHTML = `<h2>${region}</h2><p>Aucun centre</p>`;
    return;
  }

  let html = `<h2>${region}</h2>`;

  centers.forEach(c => {

    html += `
      <div class="card">

        <h3>${c.nom}</h3>
        <p><b>Ville :</b> ${c.ville || ''}</p>
        <p><b>Réunion :</b> ${c.réunion || ''}</p>
        <p><b>Réseau :</b> ${c.réseau || ''}</p>
        <p><b>Jour :</b> ${c.jour || ''}</p>
        <p><b>Horaire :</b> ${c.horaire || ''}</p>
        <p><b>Fréquence :</b> ${c.fréquence || ''}</p>
        <p><b>Lieu :</b> ${c.lieu || ''}</p>
        <p><b>Visioconférence :</b> ${c.visioconférence || ''}</p>

        ${c.dossier || ''}

      </div>
    `;

  });

  sidebar.innerHTML = html;
}

// =====================
// GEOJSON LOCAL (IMPORTANT)
// =====================
fetch("https://pantogether.fr/data/regions.geojson")
.then(r => r.json())
.then(geojson => {

  const layerGroup = L.geoJSON(geojson, {

    style:{
      fillColor:"#d9d9d9",
      color:"#ffffff",
      weight:1,
      fillOpacity:0.8
    },

    onEachFeature:(feature, layer)=>{

      const name =
        feature.properties.nom ||
        feature.properties.name;

      layer.bindTooltip(name,{
        permanent:true,
        direction:"center"
      });

      layer.on("mouseover", ()=>{
        layer.setStyle({fillOpacity:1});
      });

      layer.on("mouseout", ()=>{
        layerGroup.resetStyle(layer);
      });

      layer.on("click", ()=>{
        show(name);
      });

    }

  }).addTo(map);

});

</script>

</body>
</html>
