title: Foie et voies biliaires

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Carte debug régions</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{margin:0;height:100%;font-family:Arial;}
body{display:flex;}
#map{flex:1;height:100vh;}
#sidebar{width:340px;padding:15px;border-left:1px solid #ddd;overflow:auto;}
.region-label{
  background:transparent;border:none;box-shadow:none;
  font-weight:bold;font-size:12px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <h2>Debug</h2>
  <p>Chargement...</p>
</div>

<script>

// =====================
// MAP
// =====================
const map = L.map('map').setView([46.5,2.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OSM'
}).addTo(map);

const sidebar = document.getElementById("sidebar");

// =====================
// CENTRES TEST
// =====================
const data = {
  "Bretagne":[
    {nom:'CHU Pontchaillou',
        ville:'Rennes',
        réunion:'RCP des tumeurs primitives hépatiques',
        réseau:'',
        jour:'Jeudi',
        horaire:'16h00',
        fréquence:'Hebdomadaire',
        lieu:'Service imagerie',
        visioconférence:'',

        dossier:`
<details>
  <summary>Modalités de soumission d'un dossier</summary>

  Dossier à déposer sur le DCC du patient :

  <br><br>

  <a href="https://auth.telesantebretagne.org/" target="_blank">
    Onco Bretagne
  </a>

  <br><br>

  Ou transmission via :

  <br><br>

  <a href="https://www.telesante-bretagne.fr/" target="_blank">
    Télésanté Bretagne
  </a>

</details>

<details>
  <summary>AMA en charge de la RCP</summary>

  <a href="mailto:secretariat.rcp@rennes.unicancer.fr">
    secretariat.rcp@rennes.unicancer.fr
  </a>

</details>
`
      }
  ],
  "Île-de-France":[
    {nom:"Pitié", ville:"Paris"}
  ]
};

function show(region){
  const list = data[region];

  if(!list){
    sidebar.innerHTML = `<h2>${region}</h2><p>Aucun centre</p>`;
    return;
  }

  sidebar.innerHTML =
    `<h2>${region}</h2>` +
    list.map(c=>`
      <div style="padding:10px;border:1px solid #ddd;margin:5px 0">
        <b>${c.nom}</b><br>${c.ville}
      </div>
    `).join("");
}

// =====================
// GEOJSON SAFE LOAD
// =====================
const url = "https://pantogether.fr/data/regions.geojson";

fetch(url)
.then(r => {
  console.log("GeoJSON HTTP status:", r.status);
  return r.json();
})
.then(geojson => {

  console.log("GeoJSON loaded OK");

  const layerGroup = L.geoJSON(geojson, {

    style: {
      fillColor:"#d9d9d9",
      color:"#ffffff",
      weight:1,
      fillOpacity:0.7
    },

    onEachFeature: function(feature, layer){

      const name =
        feature.properties.nom ||
        feature.properties.name ||
        feature.properties.NOM ||
        "unknown";

      console.log("Region detected:", name);

      // label
      layer.bindTooltip(name,{
        permanent:true,
        direction:"center",
        className:"region-label"
      });

      layer.on("mouseover", ()=>{
        layer.setStyle({fillOpacity:1});
      });

      layer.on("mouseout", ()=>{
        layerGroup.resetStyle(layer);
      });

      layer.on("click", ()=>{
        console.log("CLICK WORKS:", name);
        show(name);
      });

    }

  }).addTo(map);

  // 🔥 test crucial
  console.log("GeoJSON layer added to map");

})
.catch(err => {

  console.error("❌ GeoJSON FAILED:", err);

  sidebar.innerHTML = `
    <h2 style="color:red">ERREUR GEOJSON</h2>
    <p>Le fichier de régions ne se charge pas.</p>
    <p>Cause probable : GitHub Pages bloque ou réseau.</p>
    <pre>${err}</pre>
  `;
});

</script>

</body>
</html>
