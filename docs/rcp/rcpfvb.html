title: Foie et voies biliaires

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Carte RCP V2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
<style>
html,body{
  margin:0;
  height:100%;
  font-family:Arial;
}

body{display:flex;}

#map{flex:1;height:100vh;}

#sidebar{
  width:380px;
  padding:15px;
  border-left:1px solid #ddd;
  overflow:auto;
}

#filters{
  position:sticky;
  top:0;
  background:white;
  z-index:10;
  padding-bottom:10px;
  border-bottom:1px solid #ddd;
}

#results{
  padding-top:10px;
}

button{
  margin:3px;
  padding:6px 10px;
  border-radius:6px;
  border:1px solid #ccc;
  cursor:pointer;
  background:#f5f5f5;
}

button.active{
  background:#3498db;
  color:white;
}

.card{
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  background:#fafafa;
}

.leaflet-interactive{
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">

  <div id="filters">

    <b>Cancer</b><br>

    <button onclick="setCancer('all')" id="c-all" class="active">Tous</button>
    <button onclick="setCancer('foie')" id="c-foie">Foie et Voies Biliaires</button>
    <button onclick="setCancer('oeso')" id="c-oeso">Oesophage, Estomac</button>
    <button onclick="setCancer('pancreas')" id="c-pan">Pancréas</button>

    <hr>

    <b>Zone</b><br>

    <button onclick="setZone('all')" id="z-all" class="active">Tous</button>
    <button onclick="setZone('metropole')" id="z-metro">Métropole</button>
    <button onclick="setZone('drom')" id="z-drom">DROM</button>

  </div>
<div id="panel">
 <a href="../">⬅ Retour</a> 
  <!-- 👇 ICI LES RÉSULTATS -->
  <div id="results">
    <h2>Centres</h2>
    <p>Clique une région</p>
  </div>

</div>

<script>

// ===================== MAP =====================
const map = L.map('map').setView([46.5,2.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OSM'
}).addTo(map);

// ===================== DATA =====================
const data = {
  "Bretagne":[
    zone:"metropole",
    centers:[
    {
      nom:'CHU Pontchaillou',
      ville:'Rennes',
      type:"foie",
      réunion:'RCP des tumeurs primitives hépatiques',
      réseau:'',
      jour:'Jeudi',
      horaire:'16h00',
      fréquence:'Hebdomadaire',
      lieu:'Service imagerie',
      visioconférence:'',
      dossier:`
<details>
  <summary>Modalités de soumission d'un dossier</summary>

  Dossier à déposer sur le DCC du patient :

  <br><br>

  <a href="https://auth.telesantebretagne.org/" target="_blank">Onco Bretagne</a>

  <br><br>

  Ou via :

  <br><br>

  <a href="https://www.telesante-bretagne.fr/" target="_blank">Télésanté Bretagne</a>
</details>

<details>
  <summary>AMA en charge de la RCP</summary>

  <a href="mailto:secretariat.rcp@rennes.unicancer.fr">
    secretariat.rcp@rennes.unicancer.fr
  </a>
</details>
`
    },
    
    {
      nom:'CHU Brest',
      ville:'Brest',
      type:"oeso",
      réunion:'',
      réseau:'',
      jour:'',
      horaire:'',
      fréquence:'',
      lieu:'',
      visioconférence:'',
      dossier:``
    }
  ]
},

  "Île-de-France":{
    zone:"metropole",
    centers:[
      {nom:"Pitié-Salpêtrière", ville:"Paris", cancer:"oeso", reunion:"RCP oesogastrique"}
    ]
  },
  
 "Pays de la Loire":{
    zone:"metropole",
    centers:[
      {
        nom:"CHU Nantes",
        ville:"Nantes",
        cancer:"pancreas",

        réunion:"RCP pancréas",
        réseau:'',
        jour:'',
        horaire:'',
        fréquence:'',
        lieu:'',
        visioconférence:'',
        dossier:''
      }
    ]
  },
  "Guadeloupe":{
    zone:"drom",
    centers:[
      {nom:"CHU Guadeloupe", ville:"Pointe-à-Pitre", cancer:"pancreas", reunion:"RCP pancréas"}
    ]
  }
};

// ===================== STATE =====================
let cancerFilter = "all";
let zoneFilter = "all";
let currentRegion = null;

const cancerColors = {
  "oeso": "#2ecc71",      // vert
  "foie": "#e74c3c",      // rouge
  "pancreas": "#f39c12"   // orange
};


// ===================== FILTERS =====================
function setCancer(v){
  cancerFilter = v;
  refresh();
}

function setZone(v){
  zoneFilter = v;
  refresh();
}

function refreshButtons(){

  document.querySelectorAll("#filters button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("c-" + cancerFilter)?.classList.add("active");
  document.getElementById("z-" + zoneFilter)?.classList.add("active");
}

// ===================== SIDEBAR =====================
const sidebar = document.getElementById("sidebar");

function show(region){
  currentRegion = region;
  render();
}

function refresh(){
  refreshButtons();
  if(currentRegion) render();
}

  function render(){

  const region = data[currentRegion];

  const results = document.getElementById("results");

  if(!region){
    results.innerHTML = "<h2>Aucune région</h2>";
    return;
  }

  const list = region.centers.filter(c =>
    (cancerFilter === "all" || c.cancer === cancerFilter) &&
    (zoneFilter === "all" || region.zone === zoneFilter)
  );

  let html = `<h2>${currentRegion}</h2>`;

  if(list.length === 0){
    html += "<p>Aucun centre</p>";
  }

  list.forEach(c=>{
    html += `
       <div class="card" style="border-left:6px solid ${cancerColors[c.cancer]}">
        <b>${c.nom || ""}</b><br>
      <b>Ville :</b> ${c.ville || ""}<br>
      <b>Type :</b> ${c.cancer || ""}<br>

      <b>Réunion :</b> ${c.réunion || ""}<br>
      <b>Réseau :</b> ${c.réseau || ""}<br>
      <b>Jour :</b> ${c.jour || ""}<br>
      <b>Horaire :</b> ${c.horaire || ""}<br>
      <b>Fréquence :</b> ${c.fréquence || ""}<br>
      <b>Lieu :</b> ${c.lieu || ""}<br>
      <b>Visioconférence :</b> ${c.visioconférence || ""}<br>

      ${c.dossier || ""}
    
      <span style="
          display:inline-block;
          margin-top:6px;
          padding:3px 8px;
          border-radius:999px;
          background:${cancerColors[c.cancer]};
          color:white;
          font-size:12px;
        ">
          ${c.cancer || "non classé"}
      </span>

    </div>
  `;
});

  results.innerHTML = html;
}

function normalize(name){
  return name
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim()
    .toLowerCase();
}
const regionMap = {
  "bretagne": "Bretagne",
  "ile-de-france": "Île-de-France",
  "pays de la loire": "Pays de la Loire",
  "guadeloupe": "Guadeloupe"
};
// ===================== GEOJSON =====================
fetch("https://pantogether.fr/data/regions.geojson")
.then(r => r.json())
.then(geojson => {

  const layer = L.geoJSON(geojson, {

    style:{
      fillColor:"#eaeaea",
      color:"#ffffff",
      weight:1,
      fillOpacity:0.6
    },

    onEachFeature:(feature, l)=>{

      const regionName = feature.properties.nom || feature.properties.name || "";

      l.bindTooltip(regionName, {
        permanent:true,
        direction:"center",
        className:"region-label"
      });

      l.on("click", () => {
        const key = normalize(regionName);
const realKey = regionMap[key];

console.log("CLICK:", regionName, "→", realKey);

if(realKey){
  show(realKey);
}
      });
    }

  }).addTo(map);

  // 👇 AJOUT DES CENTRES APRÈS CHARGEMENT CARTE
  renderMarkers();

});
let markersLayer = L.layerGroup().addTo(map);

function renderMarkers(){

  markersLayer.clearLayers();

  Object.entries(data).forEach(([regionName, region]) => {

    region.centers.forEach(center => {

      const color = cancerColors[center.cancer] || "#666";

      const marker = L.circleMarker(getCoords(regionName), {
        radius:8,
        color:"#fff",
        weight:2,
        fillColor:color,
        fillOpacity:1
      });

      marker.bindPopup(`
        <b>${center.nom}</b><br>
        ${center.ville}<br>
        <span style="color:${color}">
          ${center.cancer}
        </span>
      `);

      markersLayer.addLayer(marker);
    });

  });
}
  const coords = {
  "Bretagne":[48.2, -2.8],
  "Île-de-France":[48.8, 2.3],
  "Guadeloupe":[16.2, -61.5]
};

function getCoords(region){
  return coords[region] || [46.5,2.5];
}
</script>

</body>
</html>
